<!DOCTYPE html>
<html>
<head>
    <title>心脏病风险预测</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>心脏病风险预测演示</h2>
    <form id="predictForm">
        <!-- 这里的输入字段需要根据你的 feature_names 生成，仅做示例 -->
        <label>年龄: <input type="number" name="Age" value="55"></label><br>
        <label>血压: <input type="number" name="Blood Pressure" value="140"></label><br>
        <label>BMI: <input type="number" name="BMI" value="28" step="0.1"></label><br>
        <!-- 根据需要添加更多字段 -->
        <button type="submit">预测</button>
    </form>
    <div id="result" style="margin-top:20px; font-weight:bold;"></div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }
            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    患病概率: ${(result.probability * 100).toFixed(2)}%<br>
                    预测类别: ${result.prediction === 1 ? '高风险' : '低风险'}
                `;
            } catch (err) {
                document.getElementById('result').innerHTML = '请求失败: ' + err;
            }
        });
    </script>
</body>
</html>
